# Rename this file to secrets.toml

# --- Google Authentication (OIDC) ---
# 1. Go to https://console.cloud.google.com/ → APIs & Services → Credentials
# 2. Create an OAuth 2.0 Client ID (Web application)
# 3. Add your app URL to "Authorised JavaScript origins"
# 4. Add "<your-app-url>/oauth2callback" to "Authorised redirect URIs"
# 5. Copy the client_id and client_secret below
# 6. Generate a strong random cookie_secret:
#    python -c "import secrets; print(secrets.token_hex(32))"
[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "your-random-secret-here"
client_id = "your-client-id.apps.googleusercontent.com"
client_secret = "your-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"
# Only these email addresses will be allowed into the app.
# Leave as an empty list [] to allow any authenticated Google account.
allowed_emails = ["you@example.com", "friend@example.com"]

[cloud]
provider = "s3"
s3_bucket_name = "your-bucket-name"
s3_key_prefix = "expense-tracker"   # optional

# AWS credentials (only needed if not using IAM roles or ~/.aws/credentials)
# [aws]
# aws_access_key_id = "..."
# aws_secret_access_key = "..."
